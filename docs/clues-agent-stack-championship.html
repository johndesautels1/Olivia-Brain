:root {
  --bg: #0a0c10;

  --surface2: #1a1e28;

  --text2: #8b90a0;

  --gold-dim: #b8922e;
  --cyan: #4ecdc4;
  --blue: #5b8def;
  --purple: #a78bfa;
  --pink: #f472b6;
  --green: #6ee7b7;
  --red: #fb7185;
  --orange: #fb923c;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; line-height:1.6; }
.app { max-width:1600px; margin:0 auto; padding:20px; }

/* HEADER */
.header { text-align:center; padding:40px 20px 30px; border-bottom:1px solid var(--border); margin-bottom:30px; }
.header h1 { font-family:'Playfair Display',serif; font-size:2.4em; font-weight:900; background:linear-gradient(135deg,var(--gold),#f0d078,var(--gold-dim)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px; }
.header p { color:var(--text2); font-size:1em; max-width:800px; margin:0 auto; }

/* TABS */
.tabs { display:flex; gap:4px; margin-bottom:24px; flex-wrap:wrap; border-bottom:1px solid var(--border); padding-bottom:0; }
.tab { padding:10px 18px; background:transparent; border:none; color:var(--text2); cursor:pointer; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; border-bottom:2px solid transparent; transition:all .2s; }
.tab:hover { color:var(--text); }
.tab.active { color:var(--gold); border-bottom-color:var(--gold); }

/* STATS BAR */
.stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:24px; }
.stat { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:14px; text-align:center; }
.stat .num { font-family:'JetBrains Mono',monospace; font-size:1.8em; font-weight:700; color:var(--gold); }
.stat .label { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; margin-top:2px; }

/* FILTERS */
.filters { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
.filters input { background:var(--surface); border:1px solid var(--border); color:var(--text); padding:8px 14px; border-radius:6px; font-size:13px; width:260px; font-family:'DM Sans',sans-serif; }
.filters input::placeholder { color:var(--text2); }
.filters select { background:var(--surface); border:1px solid var(--border); color:var(--text); padding:8px 12px; border-radius:6px; font-size:13px; font-family:'DM Sans',sans-serif; cursor:pointer; }
.pill { display:inline-block; padding:3px 10px; border-radius:10px; font-size:11px; font-weight:600; }
.pill-cp { background:#3b82f620; color:#60a5fa; }
.pill-gm { background:#a78bfa20; color:#a78bfa; }
.pill-gk { background:#fb923c20; color:#fb923c; }
.pill-ms { background:#f4728620; color:#f472b6; }
.pill-px { background:#4ecdc420; color:#4ecdc4; }
.pill-oa { background:#6ee7b720; color:#6ee7b7; }
.pill-cl { background:#d4a85320; color:#d4a853; }

/* TABLE */
.table-wrap { overflow-x:auto; border:1px solid var(--border); border-radius:8px; }
table { width:100%; border-collapse:collapse; font-size:12.5px; }
thead th { background:var(--surface2); padding:10px 8px; text-align:left; font-weight:600; color:var(--text2); font-size:11px; text-transform:uppercase; letter-spacing:.4px; position:sticky; top:0; z-index:2; border-bottom:1px solid var(--border); white-space:nowrap; }
tbody td { padding:8px; border-bottom:1px solid var(--border); vertical-align:top; }
tbody tr:hover { background:var(--surface); }
td.tool-name { font-weight:600; color:var(--text); min-width:140px; }
td.category { color:var(--text2); font-size:11px; min-width:100px; }
.check { color:var(--green); font-weight:700; text-align:center; }
.miss { color:var(--border); text-align:center; }
.unique { color:var(--gold); font-weight:700; text-align:center; }

/* SECTIONS */
.section { margin-bottom:32px; }
.section h2 { font-family:'Playfair Display',serif; font-size:1.5em; color:var(--gold); margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--border); }
.section h3 { font-size:1.1em; color:var(--cyan); margin:16px 0 8px; }

/* OVERLAP TABLE */
.overlap-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:10px; }
.overlap-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px; }
.overlap-card .name { font-weight:700; color:var(--text); margin-bottom:4px; }
.overlap-card .count { font-family:'JetBrains Mono',monospace; color:var(--gold); font-size:12px; }
.overlap-card .llms { display:flex; gap:4px; flex-wrap:wrap; margin-top:6px; }

/* EXEC SUMMARY */
.exec { background:var(--surface); border:1px solid var(--gold-dim); border-radius:10px; padding:24px; }
.exec p { margin-bottom:12px; color:var(--text); }
.exec strong { color:var(--gold); }
.phase { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:16px; margin-bottom:12px; }
.phase h4 { color:var(--cyan); margin-bottom:6px; }
.phase ul { padding-left:18px; }
.phase li { margin-bottom:4px; color:var(--text2); }
.phase li strong { color:var(--text); }

/* RESPONSIVE */
@media(max-width:768px) {
  .header h1 { font-size:1.6em; }
  .tabs { gap:0; }
  .tab { padding:8px 12px; font-size:12px; }
  .filters { flex-direction:column; }
  .filters input { width:100%; }
}
</style>

const app = document.getElementById('app');

let activeTab = 'matrix';
let searchTerm = '';
let categoryFilter = 'All';
let llmFilter = 'All';

function countByLLM(idx) { return DATA.filter(r => r[2+idx] >= 1).length; }
function countDuplicates() { return DATA.filter(r => { let c=0; for(let i=0;i<7;i++) if(r[2+i]>=1) c++; return c>=4; }).length; }
function countUnique(idx) { return DATA.filter(r => { let c=0; for(let i=0;i<7;i++) if(r[2+i]>=1) c++; return c===1 && r[2+idx]>=1; }).length; }
function totalUnique() { return DATA.length; }

function render() {
  const filtered = DATA.filter(r => {
    if(searchTerm && !r[0].toLowerCase().includes(searchTerm.toLowerCase()) && !r[9].toLowerCase().includes(searchTerm.toLowerCase())) return false;
    if(categoryFilter !== 'All' && r[1] !== categoryFilter) return false;
    if(llmFilter !== 'All') {
      const idx = LLM_KEYS.indexOf(llmFilter);
      if(idx >= 0 && r[2+idx] < 1) return false;
    }
    return true;
  });

  app.innerHTML = `
    <div class="header">
      <h1>CLUES™ Championship Agent Stack</h1>
      <p>Master cross-LLM reference: 7 AI brains + Claude's unique contributions — ${totalUnique()} unique tools, techniques & integrations for the Olivia™ Super Agent</p>
    </div>

    <div class="stats">
      <div class="stat"><div class="num">${totalUnique()}</div><div class="label">Total Unique Items</div></div>
      <div class="stat"><div class="num">${countDuplicates()}</div><div class="label">High Consensus (4+ LLMs)</div></div>
      <div class="stat"><div class="num">${countByLLM(6)}</div><div class="label">Claude Picks</div></div>
      <div class="stat"><div class="num">${countUnique(6)}</div><div class="label">Claude Unique</div></div>
      <div class="stat"><div class="num">${CATEGORIES.length}</div><div class="label">Categories</div></div>
      <div class="stat"><div class="num">7</div><div class="label">LLM Brains</div></div>
    </div>

    <div class="tabs">
      ${['matrix','overlap','claude100','exec'].map(t => `<button class="tab ${activeTab===t?'active':''}" onclick="setTab('${t}')">${
        t==='matrix'?'Full Matrix':t==='overlap'?'Overlap Analysis':t==='claude100'?"Claude's 100":t==='exec'?'Executive Summary & Roadmap':t
      }</button>`).join('')}
    </div>

    ${activeTab==='matrix' ? renderMatrix(filtered) : ''}
    ${activeTab==='overlap' ? renderOverlap() : ''}
    ${activeTab==='claude100' ? renderClaude100() : ''}
    ${activeTab==='exec' ? renderExec() : ''}
  `;
}

      <input type="text" placeholder="Search tools, techniques, notes..." value="${searchTerm}" oninput="searchTerm=this.value;render()"/>
      <select onchange="categoryFilter=this.value;render()">
        <option value="All">All Categories</option>
        ${CATEGORIES.map(c=>`<option value="${c}" ${categoryFilter===c?'selected':''}>${c}</option>`).join('')}
      </select>
      <select onchange="llmFilter=this.value;render()">
        <option value="All">All LLMs</option>
        ${LLM_KEYS.map((k,i)=>`<option value="${k}" ${llmFilter===k?'selected':''}>${LLMs[i]}</option>`).join('')}
      </select>
      <span style="color:var(--text2);font-size:12px;">${filtered.length} of ${DATA.length} items</span>
    </div>
    <div class="table-wrap" style="max-height:70vh;overflow-y:auto;">
      <table>
        <thead>
          <tr>
            <th>#</th><th>Tool / Technique</th><th>Category</th>
            ${LLMs.map((l,i)=>`<th style="color:${Object.values(LLM_COLORS)[i]};text-align:center;min-width:60px;">${l}</th>`).join('')}
            <th>Consensus</th><th>Notes</th>
          </tr>
        </thead>
        <tbody>
          ${filtered.map((r,ri) => {
            let cnt = 0; for(let i=0;i<7;i++) if(r[2+i]>=1) cnt++;
            const consensusColor = cnt>=6?'var(--gold)':cnt>=4?'var(--green)':cnt>=2?'var(--blue)':'var(--text2)';
            return `<tr>
              <td style="color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:11px;">${ri+1}</td>
              <td class="tool-name">${r[0]}</td>
              <td class="category">${r[1]}</td>
              ${Array.from({length:7},(_,i)=> r[2+i]>=1 ? `<td class="check">✓</td>` : `<td class="miss">·</td>`).join('')}
              <td style="text-align:center;font-family:'JetBrains Mono',monospace;font-weight:700;color:${consensusColor};">${cnt}/7</td>
              <td style="color:var(--text2);font-size:11.5px;max-width:300px;">${r[9]}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderOverlap() {
  const tiers = [
    {label:'Universal (7/7)',min:7,max:7,color:'var(--gold)'},
    {label:'Strong Consensus (5-6/7)',min:5,max:6,color:'var(--green)'},
    {label:'Moderate (3-4/7)',min:3,max:4,color:'var(--blue)'},
    {label:'Low (2/7)',min:2,max:2,color:'var(--purple)'},
  ];
  let html = '<div class="section">';
  tiers.forEach(t => {
    const items = DATA.filter(r => { let c=0; for(let i=0;i<7;i++) if(r[2+i]>=1) c++; return c>=t.min && c<=t.max; });
    html += `<h3 style="color:${t.color}">${t.label} — ${items.length} items</h3>`;
    html += '<div class="overlap-grid">';
    items.forEach(r => {
      const llms = LLMs.filter((_,i) => r[2+i]>=1);
      html += `<div class="overlap-card">
        <div class="name">${r[0]}</div>
        <div class="count">${r[1]}</div>
        <div class="llms">${llms.map((l,li) => {
          const ki = LLMs.indexOf(l);
          return `<span class="pill pill-${LLM_KEYS[ki]}">${l}</span>`;
        }).join('')}</div>
      </div>`;
    });
    html += '</div>';
  });
  // Unique-per-LLM counts
  html += `<h3 style="color:var(--pink)">Unique Contributions (only 1 LLM)</h3>`;
  html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;">';
  LLMs.forEach((l,i) => {
    const c = countUnique(i);
    html += `<div class="stat"><div class="num" style="color:${Object.values(LLM_COLORS)[i]}">${c}</div><div class="label">${l} unique</div></div>`;
  });
  html += '</div></div>';
  return html;
}

function renderClaude100() {
  const claudeItems = DATA.filter(r => r[2+6]>=1);
  const claudeOnly = DATA.filter(r => { let c=0; for(let i=0;i<7;i++) if(r[2+i]>=1) c++; return c===1 && r[8]>=1; });
  const byCat = {};
  claudeItems.forEach(r => { if(!byCat[r[1]]) byCat[r[1]]=[]; byCat[r[1]].push(r); });

  let html = `<div class="section">
    <div class="stats" style="margin-bottom:20px;">
      <div class="stat"><div class="num" style="color:var(--gold)">${claudeItems.length}</div><div class="label">Total Claude Picks</div></div>
      <div class="stat"><div class="num" style="color:var(--gold)">${claudeOnly.length}</div><div class="label">Claude-Only Unique</div></div>
    </div>`;
  Object.keys(byCat).sort().forEach(cat => {
    html += `<h3 style="color:var(--cyan)">${cat} (${byCat[cat].length})</h3>`;
    html += '<div class="table-wrap"><table><thead><tr><th>#</th><th>Tool / Technique</th><th>Others?</th><th>Notes</th></tr></thead><tbody>';
    byCat[cat].forEach((r,i) => {
      let cnt=0; for(let j=0;j<7;j++) if(r[2+j]>=1) cnt++;
      const others = cnt===1 ? '<span style="color:var(--gold);font-weight:700;">UNIQUE</span>' : `${cnt-1} others`;
      html += `<tr><td style="color:var(--text2)">${i+1}</td><td class="tool-name">${r[0]}</td><td>${others}</td><td style="color:var(--text2);font-size:12px;">${r[9]}</td></tr>`;
    });
    html += '</tbody></table></div>';
  });
  html += '</div>';
  return html;
}
